<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CyberNET Pro — Quản Lý Quán Net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="login-page">
  <div class="scanlines"></div>
  <div class="grid-bg"></div>


<div style="position:fixed;top:20px;left:20px;z-index:10">
  <a href="home.html" style="color:var(--accent);font-size:0.85rem;text-decoration:none;display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.3);border-radius:25px;backdrop-filter:blur(10px);transition:all 0.2s"
     onmouseover="this.style.background='rgba(0,229,255,0.15)';this.style.borderColor='var(--accent)'"
     onmouseout="this.style.background='rgba(0,229,255,0.08)';this.style.borderColor='rgba(0,229,255,0.3)'">
    ← Trang Chủ
  </a>
</div>








  <div class="login-container">
    <div class="logo-area">
      <img src="logo.png" style="width:90px;height:90px;object-fit:contain;margin-bottom:8px;filter:drop-shadow(0 0 15px #00f5ff)">
<h1 class="logo-text">CYBER<span>NET</span> PRO</h1>
      <p class="logo-sub">Hệ Thống Quản Lý Quán Internet</p>
    </div>

    <div class="login-card">
      <div class="card-header">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        <span class="card-title">ĐĂNG NHẬP HỆ THỐNG</span>
      </div>

      <div id="loginAlert" class="alert hidden"></div>

      <div class="form-group">
        <label>TÀI KHOẢN</label>
        <input type="text" id="loginUsername" placeholder="Nhập tên đăng nhập..." autocomplete="off"/>
      </div>
      <div class="form-group">
        <label>MẬT KHẨU</label>
        <input type="password" id="loginPassword" placeholder="••••••••"/>
      </div>
      <div class="form-group">
        <label>VAI TRÒ</label>
        <select id="loginRole">
          <option value="customer">Khách Hàng</option>
          <option value="staff">Nhân Viên</option>
          <option value="manager">Quản Lý Quán</option>
          <option value="admin">Quản Trị Viên</option>
        </select>
      </div>
      <button class="btn-primary" onclick="doLogin()">
        <span>ĐĂNG NHẬP</span>
        <span class="btn-icon">→</span>
      </button>
            <p class="register-link">Chưa có tài khoản? <a onclick="showRegister()">Đăng ký ngay</a></p>
    </div>
  </div>

  <!-- Register Modal -->
  <div id="registerModal" class="modal hidden">
    <div class="modal-box">
      <div class="card-header">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        <span class="card-title">ĐĂNG KÝ TÀI KHOẢN</span>
        <button class="close-btn" onclick="hideRegister()">✕</button>
      </div>
      <div id="regAlert" class="alert hidden"></div>
      <div class="form-group"><label>HỌ TÊN</label><input type="text" id="regName" placeholder="Nguyễn Văn A"/></div>
      <div class="form-group"><label>TÊN ĐĂNG NHẬP</label><input type="text" id="regUser" placeholder="username"/></div>
      <div class="form-group"><label>MẬT KHẨU</label><input type="password" id="regPass" placeholder="••••••••"/></div>
      <div class="form-group"><label>EMAIL</label><input type="email" id="regEmail" placeholder="email@example.com"/></div>
      <div class="form-group"><label>SỐ ĐIỆN THOẠI</label><input type="text" id="regPhone" placeholder="0901234567"/></div>
      <button class="btn-primary" onclick="doRegister()">ĐĂNG KÝ</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="dashboard hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="logo.png" style="width:32px;height:32px;object-fit:contain;filter:drop-shadow(0 0 8px #00f5ff)">
<span>CYBERNET</span>
      </div>
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">KH</div>
        <div>
          <div class="user-name" id="sidebarName">Người dùng</div>
          <div class="user-role" id="sidebarRole">Khách hàng</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <button class="btn-logout" onclick="doLogout()">⏻ ĐĂNG XUẤT</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar">
        <div class="page-title" id="pageTitle">Dashboard</div>
        <div class="top-bar-right">
          <div class="clock" id="clockDisplay">00:00:00</div>
          <div class="date-display" id="dateDisplay"></div>
        </div>
      </div>
      <div class="content-area" id="contentArea">
        <!-- Injected by JS -->
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
